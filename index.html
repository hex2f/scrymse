<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scrymse</title>
  </head>
  <body class="flex min-h-dvh flex-col bg-slate-50 text-slate-800 antialiased">
    <div
      id="toaster"
      class="pointer-events-none fixed inset-x-0 top-4 z-50 flex justify-center overflow-visible px-4"
    >
      <div id="toast-stack" class="relative w-full max-w-md"></div>
    </div>
    <div class="mx-auto flex min-h-0 w-full max-w-2xl flex-1 flex-col px-4 py-4">
      <div id="upload-panel" class="flex min-h-0 flex-1 flex-col justify-center">
        <label
          id="drop-zone"
          class="group relative flex min-h-0 max-h-72 w-full flex-1 flex-col items-center justify-center gap-4 rounded-2xl border-2 border-dashed border-slate-300 bg-white px-8 py-14 text-center shadow-sm transition-all duration-200 ease-out hover:border-indigo-400 hover:bg-indigo-50/40 hover:shadow-md focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-100 cursor-pointer"
        >
          <div class="space-y-1">
            <h1 class="text-lg font-semibold tracking-tight text-slate-900">
              Generate scryfall-like pastable text from your
              <code class="rounded bg-slate-100 px-1.5 py-0.5 font-mono text-sm text-indigo-600">.mse-set</code>
              file
            </h1>
            <p class="text-sm text-slate-500">
              Drag and drop your file here, or
              <span class="font-medium text-indigo-600 group-hover:underline">click to upload</span>.
            </p>
          </div>

          <input
            type="file"
            id="file-input"
            multiple
            accept=".mse-set"
            class="sr-only"
          />
        </label>
      </div>

      <div id="results-panel" class="hidden flex min-h-0 w-full flex-1 flex-col gap-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div class="flex flex-wrap items-center gap-2">
            <button
              type="button"
              id="copy-all-btn"
              class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
              Copy all
            </button>
            <button
              type="button"
              id="download-txt-btn"
              class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-800 shadow-sm transition hover:border-slate-400 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
              Download .txt
            </button>
          </div>
          <button
            type="button"
            id="upload-again-btn"
            class="text-sm font-medium text-indigo-600 underline-offset-2 hover:underline"
          >
            Upload another file
          </button>
        </div>
        <div id="cpt-list" class="flex min-h-0 flex-1 flex-col gap-2 overflow-visible pr-1"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
